<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>半導体工場シミュレーター</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect x='3' y='3' width='10' height='10' rx='1.5' fill='%237761a7'/%3E%3Crect x='6' y='6' width='4' height='4' fill='%23f2f4f6'/%3E%3C/svg%3E" />
  <style>
    :root {
      --ink: #243138;
      --dim: #5d6d76;
      --line: #d4dbdf;
      --surface: #ffffff;
      --surface2: #f4f6f7;
      --accent: #7761a7;
      --bad: #cc4f44;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP",
        "Yu Gothic UI", system-ui, sans-serif;
      font-size: 13px;
      color: var(--ink);
      background: #dce1e4;
    }
    b, .stat b { font-variant-numeric: tabular-nums; }
    #game { position: fixed; inset: 0; display: block; cursor: crosshair; }
    button { font-family: inherit; color: inherit; }

    /* ---- 上部ステータスストリップ ---- */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 42px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 10px;
      padding: 0 12px;
      user-select: none;
      white-space: nowrap;
      z-index: 10;
    }
    .brand { font-weight: 700; font-size: 12px; letter-spacing: 0.04em; white-space: nowrap; }
    .brand .tag {
      margin-left: 6px; font-size: 9px; font-weight: 600; color: var(--accent);
      border: 1px solid currentColor; padding: 1px 4px; letter-spacing: 0.1em;
      vertical-align: 1px;
    }
    .stats { display: flex; align-items: center; gap: 0; }
    .stat {
      display: flex; align-items: baseline; gap: 5px;
      padding: 0 9px; border-left: 1px solid var(--line);
      white-space: nowrap;
    }
    .stat label { font-size: 10px; color: var(--dim); letter-spacing: 0.04em; }
    .stat b { font-size: 13px; }
    .stat b i { font-style: normal; font-size: 10px; color: var(--dim); }
    .stat.oht button {
      width: 20px; height: 20px; border: 1px solid var(--line); background: var(--surface2);
      cursor: pointer; font-size: 13px; line-height: 1; align-self: center;
    }
    .stat.oht button:hover { border-color: var(--accent); }
    .grow { flex: 1; }
    .ctl { display: flex; align-items: center; gap: 6px; }
    .ctl .spawn { display: flex; align-items: center; gap: 5px; }
    .ctl .spawn label { font-size: 10px; color: var(--dim); }
    .ctl .spawn input { width: 64px; accent-color: var(--accent); }
    .ctl .spawn b { font-size: 12px; min-width: 24px; }
    .tbtn, .seg button {
      border: 1px solid var(--line); background: var(--surface);
      padding: 4px 7px; cursor: pointer; font-size: 12px;
    }
    @media (max-width: 1360px) {
      .brand { display: none; }
    }
    .tbtn:hover, .seg button:hover { border-color: var(--accent); }
    .tbtn.on, .seg button.on { background: #efeaf7; border-color: var(--accent); color: var(--accent); }
    .seg { display: inline-flex; }
    .seg button + button { border-left: none; }
    .menuwrap { position: relative; }
    #dataPop {
      position: absolute; top: 30px; right: 0; width: 168px;
      background: var(--surface); border: 1px solid var(--line);
      box-shadow: 0 6px 20px rgba(50, 70, 80, 0.16);
      padding: 6px; z-index: 20;
      display: flex; flex-direction: column; gap: 4px;
    }
    #dataPop[hidden] { display: none; }
    #dataPop button {
      border: 1px solid var(--line); background: var(--surface);
      padding: 6px 8px; font-size: 12px; cursor: pointer; text-align: left;
    }
    #dataPop button:hover { border-color: var(--accent); }
    #dataPop button.danger { color: var(--bad); }
    #dataPop button.danger:hover { border-color: var(--bad); }
    #dataPop button.confirming {
      background: var(--bad); color: #fff; border-color: var(--bad);
      font-weight: 600;
    }
    #dataPop .dim { color: var(--dim); font-size: 10px; padding: 2px 2px 0; }

    /* ---- 下部ホットバー ---- */
    #hotbar {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4px;
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 5px;
      box-shadow: 0 4px 16px rgba(50, 70, 80, 0.12);
      user-select: none;
      z-index: 10;
    }
    #hotbar .tool {
      position: relative;
      width: 62px; height: 58px;
      border: 1px solid var(--line); background: var(--surface);
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
    }
    #hotbar .tool:hover { border-color: var(--accent); }
    #hotbar .tool.on {
      background: #efeaf7; border-color: var(--accent);
      box-shadow: inset 0 -2px 0 var(--accent);
    }
    #hotbar .tool i {
      position: absolute; top: 2px; left: 4px;
      font-style: normal; font-size: 9px; color: var(--dim);
    }
    #hotbar .tool span { font-size: 9.5px; color: var(--ink); letter-spacing: 0.02em; }

    /* ---- 工程フローパネル ---- */
    #flow {
      position: fixed; top: 52px; right: 10px; width: 218px;
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 10px 12px;
      user-select: none;
      z-index: 9;
    }
    #flow.hidden { display: none; }
    #flow h2 {
      font-size: 10px; color: var(--dim); font-weight: 600;
      letter-spacing: 0.08em; margin-bottom: 7px;
    }
    #prodTabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .ptab {
      display: flex; align-items: center; gap: 4px;
      border: 1px solid var(--line); background: var(--surface);
      padding: 3px 7px; font-size: 11px; cursor: pointer;
    }
    .ptab .sw { width: 8px; height: 8px; }
    .ptab small { color: var(--dim); font-size: 9.5px; }
    .ptab:hover:not(:disabled) { border-color: var(--accent); }
    .ptab.on { background: #efeaf7; border-color: var(--accent); }
    .ptab.locked { opacity: 0.55; cursor: default; }
    #flow .step { display: flex; align-items: center; gap: 6px; padding: 2.5px 0; }
    #flow .sw { width: 8px; height: 8px; flex: none; }
    #flow .nm { font-size: 11.5px; }
    #flow .bar {
      margin-left: auto; width: 52px; height: 5px; background: var(--surface2);
      overflow: hidden; flex: none;
    }
    #flow .bar i { display: block; height: 100%; background: var(--accent); }
    #flow .cnt { font-size: 11.5px; min-width: 16px; text-align: right; }
    #flow .spark { margin-top: 9px; border-top: 1px solid var(--line); padding-top: 8px; }
    #flow .spark h2 { display: flex; justify-content: space-between; align-items: baseline; }
    #flow .spark h2 b { font-size: 12px; color: var(--ink); }
    #flow .spark canvas { display: block; }

    /* ---- コンテキストカード ---- */
    #ctxcard {
      position: fixed; width: 224px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-top: 3px solid var(--accent);
      box-shadow: 0 6px 20px rgba(50, 70, 80, 0.16);
      padding: 10px 12px 12px;
      z-index: 11;
    }
    #ctxcard .head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 7px;
    }
    #ctxcard .head .nm { font-weight: 700; font-size: 13px; }
    #ctxcard .head .lbl { font-size: 10px; color: var(--dim); letter-spacing: 0.05em; }
    #ctxcard .row {
      display: flex; align-items: center; gap: 8px;
      padding: 2.5px 0; font-size: 12px;
    }
    #ctxcard .row span:first-child { color: var(--dim); font-size: 11px; min-width: 44px; }
    #ctxcard .row b { margin-left: auto; }
    #ctxcard .gauge {
      flex: 1; height: 5px; background: var(--surface2); overflow: hidden;
    }
    #ctxcard .gauge i { display: block; height: 100%; }
    #ctxcard .alert {
      margin-top: 6px; padding: 5px 8px; font-size: 11px;
      color: #8a6414; background: #faf3e0; border: 1px solid #ecd9a8;
    }
    #ctxcard .alert.bad {
      color: #93392f; background: #faeae8; border-color: #e6b7b1;
    }
    #ctxcard .mix { margin-top: 8px; border-top: 1px solid var(--line); padding-top: 6px; }
    #ctxcard .mix h3 {
      font-size: 10px; color: var(--dim); font-weight: 600;
      letter-spacing: 0.06em; margin-bottom: 4px;
    }
    #ctxcard .mixrow {
      display: flex; align-items: center; gap: 6px; padding: 2.5px 0; font-size: 12px;
    }
    #ctxcard .mixrow .sw { width: 8px; height: 8px; flex: none; }
    #ctxcard .mixrow .nm { flex: 1; }
    #ctxcard .mixrow b { min-width: 14px; text-align: center; }
    #ctxcard .mixrow .mbtn {
      width: 20px; height: 20px; border: 1px solid var(--line);
      background: var(--surface2); cursor: pointer; font-size: 13px; line-height: 1;
    }
    #ctxcard .mixrow .mbtn:hover { border-color: var(--accent); }
    #ctxcard .btns { display: flex; gap: 6px; margin-top: 10px; }
    #ctxcard .btns button {
      flex: 1; padding: 5px 0; font-size: 12px; cursor: pointer;
      border: 1px solid var(--line); background: var(--surface);
    }
    #ctxcard .btns button:hover:not(:disabled) { border-color: var(--accent); }
    #ctxcard .btns button:disabled { opacity: 0.4; cursor: default; }
    #ctxcard .btns button.danger { color: var(--bad); }
    #ctxcard .btns button.danger:hover { border-color: var(--bad); }

    /* ---- トースト ---- */
    #toast {
      position: fixed; left: 50%; bottom: 84px; transform: translateX(-50%);
      background: rgba(36, 49, 56, 0.92); color: #f2f4f6;
      padding: 7px 16px; font-size: 12px;
      opacity: 0; transition: opacity 0.25s; pointer-events: none;
      white-space: nowrap;
      z-index: 12;
    }
    #toast.show { opacity: 1; }

    @media (prefers-reduced-motion: reduce) {
      #toast { transition: none; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud"></div>
  <div id="toast"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
